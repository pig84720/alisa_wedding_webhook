name: Deploy to Azure App Service (Korea Central)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write GCP service account credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > serviceAccount.json

      - name: Deploy to Azure Web App (Korea Central)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_KOREA }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_KOREA }}
          package: .
