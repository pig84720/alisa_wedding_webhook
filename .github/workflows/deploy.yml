name: Deploy to Azure App Service

on:
  push:
    branches:
      - main          # push 到 main 分支時自動部署
  workflow_dispatch:  # 允許在 GitHub UI 手動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 3.12
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. 安裝相依套件
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. 從 GitHub Secret 還原 serviceAccount.json
      #    在 GitHub → Settings → Secrets 新增 GOOGLE_CREDENTIALS_JSON
      #    值為 serviceAccount.json 的完整 JSON 內容
      - name: Write GCP service account credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > serviceAccount.json

      # 5. 部署到 Azure App Service
      #    在 GitHub → Settings → Secrets 新增 AZURE_WEBAPP_PUBLISH_PROFILE
      #    值從 Azure Portal → 你的 Web App → 概觀 → 「取得發行設定檔」下載
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}   # 在 GitHub Variables 設定
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
